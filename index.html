<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather-Ana Chan</title>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Icon sizing helper */
    .icon {
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      line-height: 1;
    }
    .icon svg {
      width: 14px;
      height: 14px;
      stroke-width: 2;
      display: block;
    }
    .detail-item {
      display: flex !important;
      align-items: center !important;
      gap: 4px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="window">
    <!-- Title Bar -->
    <div class="title-bar">
      <div class="title">Weather - Ana Chan ❀</div>
      <div class="controls">
        <button class="btn-control" id="btnMinimize">-</button>
        <button class="btn-control" id="btnClose">x</button>
      </div>
    </div>
    
    <!-- Main Content -->
    <div class="content">
      <!-- Weather Display Box -->
      <div class="weather-box">
        <!-- Character Canvas -->
        <canvas id="weatherCanvas" width="200" height="180"></canvas>
        
        <!-- Speech Bubble -->
        <div class="speech-bubble">
          <div id="weatherMessage">Halo! Mau cek cuaca dimana?</div>
        </div>
        
        <!-- Weather Info -->
        <div class="weather-info">
          <div class="temp-display">
            <span id="temperature">--°</span>
          </div>
          <div class="location-display">
            <span id="location"> --</span>
          </div>
          <div class="weather-details">
            <div class="detail-item">
              <span class="icon"><i data-lucide="droplets"></i></span>
              <span id="humidity">--</span>%
            </div>
            <div class="detail-item">
              <span class="icon"><i data-lucide="wind"></i></span>
              <span id="wind">--</span> km/h
            </div>
          </div>
        </div>
      </div>
      
      <!-- Search Box -->
      <div class="search-box">
        <input 
          type="text" 
          id="cityInput" 
          placeholder="Ketik nama kota..."
          value="Jakarta"
        >
        <button id="btnSearch">
          <span class="icon"><i data-lucide="search"></i></span>
        </button>
      </div>
      
      <!-- Refresh Button -->
      <button id="btnRefresh">
        <span class="icon"><i data-lucide="refresh-cw"></i></span>
        Refresh Weather
      </button>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    // Initialize Lucide icons after DOM is ready
    lucide.createIcons();
  </script>
</body>
</html>
